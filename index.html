<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;}
#app{display:flex;flex-direction:column;height:100vh;}
#header{background:linear-gradient(135deg,#0d1b2a,#1a3558);color:#fff;padding:9px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.hl{font-size:22px;}.ht h1{font-size:15px;font-weight:700;}.ht p{font-size:10px;opacity:.5;margin-top:1px;}
#toolbar{background:#fff;border-bottom:2px solid #dee2e6;padding:5px 10px;display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
.fr{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.rl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#aaa;min-width:90px;}
.chip{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;cursor:pointer;border:none;color:#fff;transition:opacity .15s;user-select:none;}
.chip.off{opacity:.2;}
.chip .n{background:rgba(0,0,0,.22);border-radius:999px;padding:1px 5px;font-size:10px;}
.dv{width:1px;height:18px;background:#dee2e6;margin:0 2px;}
#sb{background:#f8f9fa;border-bottom:1px solid #dee2e6;padding:3px 12px;font-size:11px;color:#666;flex-shrink:0;}
#map{flex:1;min-height:0;}
.pn{font-size:13px;font-weight:700;color:#0d1b2a;margin-bottom:3px;}
.ps{font-size:10px;color:#999;margin-bottom:2px;}
.pb{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:999px;color:#fff;}
.pa{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:999px;color:#fff;margin-left:3px;}
.pr{font-size:10px;color:#666;font-style:italic;margin-top:3px;}

/* ── Tab Navigation ── */
#tabs { display:flex; background:#0d1b2a; flex-shrink:0; }
.tab { flex:1; padding:10px 0; text-align:center; font-size:12px; font-weight:700;
  color:rgba(255,255,255,.4); cursor:pointer; border-bottom:3px solid transparent;
  transition:all .2s; user-select:none; }
.tab.active { color:#fff; border-bottom-color:#3498db; }

/* ── Screens ── */
#screen-map { display:flex; flex-direction:column; flex:1; min-height:0; }
#screen-list { display:none; flex-direction:column; flex:1; min-height:0; background:#f5f6fa; }

/* ── Checkliste Header ── */
#list-header { background:#fff; padding:10px 12px; border-bottom:1px solid #dee2e6; flex-shrink:0; }
#list-progress { font-size:11px; color:#666; margin-bottom:6px; }
#list-progress-bar { height:4px; background:#eee; border-radius:2px; overflow:hidden; }
#list-progress-fill { height:100%; background:#16a085; border-radius:2px; transition:width .3s; }
#list-search { width:100%; padding:7px 10px; border:1px solid #dee2e6; border-radius:8px;
  font-size:13px; margin-top:6px; outline:none; }
#list-filter { display:flex; gap:4px; margin-top:6px; flex-wrap:wrap; }
.lf { padding:3px 9px; border-radius:999px; font-size:11px; font-weight:600;
  cursor:pointer; border:1.5px solid #dee2e6; background:#fff; color:#666; }
.lf.active { background:#0d1b2a; color:#fff; border-color:#0d1b2a; }

/* ── Checkliste Body ── */
#list-body { flex:1; overflow-y:auto; padding:8px 0; }
.list-group { margin-bottom:4px; }
.list-group-header { padding:6px 12px; font-size:10px; font-weight:700;
  text-transform:uppercase; letter-spacing:.6px; color:#aaa; background:#f5f6fa;
  position:sticky; top:0; z-index:1; }
.list-item { display:flex; align-items:center; gap:10px; padding:9px 12px;
  background:#fff; border-bottom:1px solid #f0f0f0; cursor:pointer; active:background:#f5f6fa; }
.list-item.done .li-name { text-decoration:line-through; color:#bbb; }
.list-item.done .li-sub { color:#ccc; }
.li-check { width:22px; height:22px; border-radius:6px; border:2px solid #dee2e6;
  flex-shrink:0; display:flex; align-items:center; justify-content:center;
  font-size:13px; transition:all .15s; }
.list-item.done .li-check { background:#16a085; border-color:#16a085; color:#fff; }
.li-name { font-size:13px; font-weight:600; color:#0d1b2a; }
.li-sub { font-size:10px; color:#999; margin-top:1px; }
</style>
</head>

  <div class="fr">
    <span class="rl">Meine Karte:</span>

  </div>
  <div class="fr">
    <span class="rl">Highlights:</span>
    <button class="chip off" id="chb" style="background:#c0392b" onclick="tog('h','b')">&#9670; Bauwerke <span class="n" id="nhb">0</span></button>
    <button class="chip off" id="chm" style="background:#7f8c00" onclick="tog('h','m')">&#9670; Museumsbahnen <span class="n" id="nhm">0</span></button>
    <button class="chip off" id="chf" style="background:#6c3483" onclick="tog('h','f')">&#9670; Fotospots <span class="n" id="nhf">0</span></button>
  </div>
</div>
<div id="sb"><span id="sb-txt">Lade...</span></div>
<div id="map"></div>
</div><!-- /screen-map -->

<div id="screen-list">
  <div id="list-header">
    <div id="list-progress"><span id="lp-done">0</span> von <span id="lp-total">0</span> besucht</div>
    <div id="list-progress-bar"><div id="list-progress-fill" style="width:0%"></div></div>
    <input id="list-search" type="search" placeholder="&#x1F50D; Suchen..." oninput="renderList()">
    <div id="list-filter">
      <div class="lf active" onclick="setLF('all',this)">Alle</div>
      <div class="lf" onclick="setLF('open',this)">Noch offen</div>
      <div class="lf" onclick="setLF('done',this)">Besucht</div>
      <div class="lf" onclick="setLF('signal',this)">Nur Formsignale</div>
      <div class="lf" onclick="setLF('spot',this)">Nur Fotospots</div>
    </div>
  </div>
  <div id="list-body"></div>
</div>
</div>

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19}).addTo(theMap);

var activeS = new Set();
var activeA = new Set();
var activeH = new Set();

function mkSignalIcon(status, ann) {
  var sc = SC[status];
  var ac = ann ? AC[ann] : null;
  var badge = ac ? "<div style=\"position:absolute;top:-3px;right:-3px;width:7px;height:7px;background:" + ac.col + ";border:1.5px solid #fff;border-radius:50%;\"></div>" : "";
  return L.divIcon({
    className:"",
    html:"<div style=\"position:relative;width:14px;height:14px\"><div style=\"position:absolute;top:1px;left:1px;width:12px;height:12px;background:" + sc.col + ";border:1.5px solid " + sc.dark + ";border-radius:50%;box-shadow:0 1px 3px rgba(0,0,0,.4);\"></div>" + badge + "</div>",
    iconSize:[14,14], iconAnchor:[7,7], popupAnchor:[0,-9]
  });
}

function mkHighlightIcon(kat) {
  var hc = HC[kat];
  return L.divIcon({
    className:"",
    html:"<div style=\"width:12px;height:12px;background:" + hc.col + ";border:1.5px solid " + hc.dark + ";transform:rotate(45deg);box-shadow:0 1px 3px rgba(0,0,0,.4);\"></div>",
    iconSize:[12,12], iconAnchor:[6,6], popupAnchor:[0,-8]
  });
}

var allMarkers = [];
var cntS = {1:0,3:0,5:0,7:0};
var cntA = {p:0,i:0,v:0};

D.forEach(function(row) {
  var name=row[0],status=row[1],lat=row[2],lng=row[3],land=row[4],bahn=row[5],kbs=row[6],rem=row[7]||"";
  var ann = ANN[name] || null;
  var annKey = ann || "0";
  var sc = SC[status];
  var ac = ann ? AC[ann] : null;
  var mk = L.marker([lat,lng], {icon:mkSignalIcon(status,ann)});
  mk.bindPopup(
    "<div class=\"pn\">" + name + "</div>" +
    "<div class=\"ps\">" + land + " &middot; " + bahn + " &middot; KBS " + kbs + "</div>" +
    "<span class=\"pb\" style=\"background:" + sc.col + "\">" + sc.sym + " " + sc.lbl + "</span>" +
    (ac ? "<span class=\"pa\" style=\"background:" + ac.col + "\">" + ac.sym + " " + ac.lbl + "</span>" : "") +
    (rem ? "<div class=\"pr\">&#8505; " + rem + "</div>" : "")
  );
  allMarkers.push({mk:mk, status:status, ann:ann, annKey:annKey, name:name});
  cntS[status]++;
  if (ann) cntA[ann]++;
});

Object.keys(cntS).forEach(function(s){ document.getElementById("ns"+s).textContent = cntS[s]; });
Object.keys(cntA).forEach(function(a){ document.getElementById("na"+a).textContent = cntA[a]; });

var allHighlights = [];
var cntH = {b:0,m:0,f:0};

H.forEach(function(row) {
  var name=row[0],kat=row[1],lat=row[2],lng=row[3],desc=row[4],url=row[5]||"";
  var hc = HC[kat];
  var mk = L.marker([lat,lng], {icon:mkHighlightIcon(kat)});
  mk.bindPopup(
    "<div class=\"pn\">" + name + "</div>" +
    "<span class=\"pb\" style=\"background:" + hc.col + "\">&#9670; " + hc.lbl + "</span>" +
    "<div class=\"pr\" style=\"margin-top:5px\">" + desc + "</div>" +
    (url ? "<div style=\"margin-top:5px\"><a href=\"" + url + "\" target=\"_blank\" style=\"font-size:11px;color:#2980b9\">" + url.replace("https://","") + "</a></div>" : "")
  );
  allHighlights.push({mk:mk, kat:kat});
  cntH[kat]++;
});

Object.keys(cntH).forEach(function(k){ document.getElementById("nh"+k).textContent = cntH[k]; });

function applyFilter() {
  var shown = 0;
  allMarkers.forEach(function(o) {
    var visible = false;
    // Annotierte Stationen: sichtbar wenn ihre Annotation aktiv ist
    if (o.ann === "p" && activeA.has("p")) visible = true;
    else if (o.ann === "p" && activeA.has("i")) visible = true;
    else if (o.ann === "i" && activeA.has("i")) visible = true;
    else if (o.ann === "v" && activeA.has("v")) visible = true;
    // Alle Stationen: sichtbar wenn ihr Status aktiv ist
    if (activeS.has(o.status)) visible = true;
    if (visible) { if (!theMap.hasLayer(o.mk)) o.mk.addTo(theMap); shown++; }
    else         { if ( theMap.hasLayer(o.mk)) theMap.removeLayer(o.mk); }
  });
  document.getElementById("sb-txt").textContent = shown + " von " + D.length + " Betriebsstellen sichtbar";
}

function tog(type, key) {
  var chipId = type==="s" ? "cs"+key : type==="a" ? "ca"+key : "ch"+key;
  var set     = type==="s" ? activeS  : type==="a" ? activeA  : activeH;
  var chip = document.getElementById(chipId);
  if (set.has(key)) { set.delete(key); chip.classList.add("off"); }
  else              { set.add(key);    chip.classList.remove("off"); }
  allHighlights.forEach(function(o) {
    if (activeH.has(o.kat)) { if (!theMap.hasLayer(o.mk)) o.mk.addTo(theMap); }
    else                    { if ( theMap.hasLayer(o.mk)) theMap.removeLayer(o.mk); }
  });
  applyFilter();

var VISITED = new Set(JSON.parse(localStorage.getItem('fs-visited') || '[]'));
var listFilter = 'all';

function saveVisited() {
  localStorage.setItem('fs-visited', JSON.stringify([...VISITED]));
}

function toggleVisited(name) {
  if (VISITED.has(name)) VISITED.delete(name);
  else VISITED.add(name);
  saveVisited();
  updateProgress();
  renderList();
  // Marker auf der Karte aktualisieren
  allMarkers.forEach(function(o) {
    if (o.name === name) {
      o.mk.setIcon(mkSignalIcon(o.status, VISITED.has(name) ? 'v' : (ANN[name]||null)));
    }
  });
}

function updateProgress() {
  var total = D.length + H.length;
  var done = 0;
  D.forEach(function(r){ if (VISITED.has(r[0])) done++; });
  H.forEach(function(r){ if (VISITED.has(r[0])) done++; });
  document.getElementById('lp-done').textContent = done;
  document.getElementById('lp-total').textContent = total;
  document.getElementById('list-progress-fill').style.width = Math.round(done/total*100) + '%';
}

function setLF(f, el) {
  listFilter = f;
  document.querySelectorAll('.lf').forEach(function(e){ e.classList.remove('active'); });
  el.classList.add('active');
  renderList();
}

function renderList() {
  var q = document.getElementById('list-search').value.toLowerCase();
  var body = document.getElementById('list-body');
  var html = '';

  // Bundesländer-Gruppen für Formsignale
  var byLand = {};
  if (listFilter !== 'spot') {
    D.forEach(function(r) {
      var name=r[0], land=r[4];
      var done = VISITED.has(name);
      if (listFilter === 'open' && done) return;
      if (listFilter === 'done' && !done) return;
      if (q && name.toLowerCase().indexOf(q) < 0) return;
      if (!byLand[land]) byLand[land] = [];
      byLand[land].push({name:name, sub:r[5]+' · KBS '+r[6], done:done});
    });
    Object.keys(byLand).sort().forEach(function(land) {
      html += '<div class="list-group">';
      html += '<div class="list-group-header">&#9679; Formsignale – ' + land + '</div>';
      byLand[land].forEach(function(item) {
        html += listItemHTML(item.name, item.sub, item.done);
      });
      html += '</div>';
    });
  }

  // Highlight-Gruppen
  if (listFilter !== 'signal') {
    var byKat = {};
    H.forEach(function(r) {
      var name=r[0], kat=r[1];
      var done = VISITED.has(name);
      if (listFilter === 'open' && done) return;
      if (listFilter === 'done' && !done) return;
      if (q && name.toLowerCase().indexOf(q) < 0) return;
      var katName = HC[kat].lbl + 'en';
      if (!byKat[katName]) byKat[katName] = [];
      byKat[katName].push({name:name, sub:r[4]||'', done:done});
    });
    Object.keys(byKat).sort().forEach(function(kat) {
      html += '<div class="list-group">';
      html += '<div class="list-group-header">&#9670; ' + kat + '</div>';
      byKat[kat].forEach(function(item) {
        html += listItemHTML(item.name, item.sub, item.done);
      });
      html += '</div>';
    });
  }

  if (!html) html = '<div style="text-align:center;padding:40px;color:#aaa;font-size:13px">Keine Eintr&#228;ge gefunden</div>';
  body.innerHTML = html;
  // Event delegation
  body.onclick = function(e) {
    var item = e.target.closest('.list-item');
    if (item) toggleVisited(item.getAttribute('data-name'));
  };
}

function listItemHTML(name, sub, done) {
  var enc = name.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");
  return "<div class=\"list-item" + (done?" done":"") + "\" data-name=\"" + enc + "\">" +
    "<div class=\"li-check\">" + (done?"&#10003;":"") + "</div>" +
    "<div><div class=\"li-name\">" + name + "</div><div class=\"li-sub\">" + sub + "</div></div>" +
    "</div>";
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  if (tab === 'map') {
    document.getElementById('screen-map').style.display = 'flex';
    document.getElementById('screen-list').style.display = 'none';
    document.querySelector('.tab:nth-child(1)').classList.add('active');
    theMap.invalidateSize();
  } else {
    document.getElementById('screen-map').style.display = 'none';
    document.getElementById('screen-list').style.display = 'flex';
    document.querySelector('.tab:nth-child(2)').classList.add('active');
    updateProgress();
    renderList();
  }
}
